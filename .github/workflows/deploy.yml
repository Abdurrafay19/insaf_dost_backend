name: Sync Standalone Backend to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set Up Git Credentials
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Force Push to Hugging Face Space Git Remote
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://abdurrafay-codes:$HF_TOKEN@huggingface.co/spaces/abdurrafay-codes/insaf_dost_backend HEAD:main