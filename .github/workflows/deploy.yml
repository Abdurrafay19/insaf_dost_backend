name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch: # Allows you to manually trigger the deployment if needed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # Crucial if you ever track large model binaries via Git LFS

      - name: Push to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: abdurrafay-codes/insaf_dost_backend # e.g., abdurrafay19/insafdost-backend
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker